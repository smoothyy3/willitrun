# Device specifications database for willitrun
#
# ★ MANDATORY fields for estimation engine (Tier 2 scaling + memory fit):
#   gpu.tflops_fp16    — TechPowerUp → Theoretical Performance → "FP16 (half)"
#   memory.total_gb    — TechPowerUp → Memory → "Memory Size"
#   memory.bandwidth_gbps — TechPowerUp → Memory → "Bandwidth" (convert TB/s → GB/s: ×1000)
#
# All other fields are informational / for future use.
#
# Sources: Wikipedia GPU comparison tables, NVIDIA official Jetson specs.
# Values use FP16 (half) TFLOPS where available; FP32 boost where FP16 not listed
# (modern NVIDIA GPUs have FP16 1:1 with FP32 in shader units).

# ============================================================
# NVIDIA Jetson Family
# Source: nvidia.com/embedded/jetson-orin, Wikipedia Nvidia Jetson
# ============================================================

jetson-nano-4gb:
  name: "NVIDIA Jetson Nano 4GB"
  vendor: nvidia
  device_family: jetson
  type: edge
  gpu:
    name: "Maxwell"
    cuda_cores: 128
    tflops_fp16: 0.5
  memory:
    total_gb: 4
    type: "LPDDR4"
    bandwidth_gbps: 25.6
    unified: true
  tdp_watts: 10
  supported_precisions: [fp32, fp16]
  supported_runtimes: [pytorch, tensorrt, onnxruntime, tflite, ncnn]

