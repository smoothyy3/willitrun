name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Build benchmark DB
        run: make build_db

      - name: Run tests
        run: pytest

      - name: Verify import on this Python version
        run: python -c "import willitrun; from willitrun.estimator import estimate; print('import OK')"
