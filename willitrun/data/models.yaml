# Known model metadata for willitrun
# Fill in real values from official papers / model cards / verified measurements.
#
# ★ MANDATORY fields for estimation engine:
#   parameters: int       — needed for memory fit check (params × bytes_per_precision)
#   flops: int            — needed for Tier 2 FLOPs-based scaling
#
# Where to find values:
#   Vision models:  Papers With Code (paperswithcode.com) → search model → "Model Size"
#   LLMs:           Hugging Face (huggingface.co/{org}/{model}) → config.json
#   YOLO:           Ultralytics docs (docs.ultralytics.com) → model comparison tables
#
# ============================================================
# TEMPLATES — copy the right one when adding a new model
# ============================================================
#
# --- Vision model (detection / classification / segmentation) ---
# my-model:
#   aliases: ["my-model", "MyModel"]
#   model_type: detection              # detection | classification | segmentation | pose
#   architecture: yolo                 # model family name
#   default_input_size: "640x640"      # input resolution used for FLOPs measurement
#   parameters:                        # total params, e.g. 3200000
#   flops:                             # FLOPs at default_input_size, e.g. 8700000000
#   weights_size_mb:                   # .pt file size in MB at FP32
#
# --- LLM ---
# my-llm:
#   aliases: ["my-llm"]
#   model_type: llm
#   architecture: llama
#   parameters:                        # total params, e.g. 8000000000
#   weights_size_mb:                   # FP32 weight file size in MB
#   llm_config:                        # from HuggingFace config.json:
#     hidden_size:                     #   "hidden_size"
#     num_hidden_layers:               #   "num_hidden_layers"
#     num_attention_heads:             #   "num_attention_heads"
#     intermediate_size:               #   "intermediate_size"
#     vocab_size:                      #   "vocab_size"
#     max_position_embeddings:         #   "max_position_embeddings"
#
# --- Audio ---
# my-audio-model:
#   aliases: ["my-audio"]
#   model_type: audio
#   architecture: whisper
#   parameters:
#   flops:
#
# --- Image Generation ---
# my-diffusion:
#   aliases: ["my-diffusion"]
#   model_type: image_generation
#   architecture: diffusion
#   default_input_size: "1024x1024"
#   parameters:                        # total params (UNet + text encoder + VAE)
#   weights_size_mb:

